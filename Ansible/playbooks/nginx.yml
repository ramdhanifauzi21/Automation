---
- name: Setup Nginx Reverse Proxy with Docker
  hosts: gateway
  become: true

  tasks:
    - name: Create Nginx config directory
      file:
        path: /home/{{ ansible_user }}/nginx
        state: directory

    - name: Copy Nginx config
      copy:
        dest: /home/{{ ansible_user }}/nginx/default.conf
        content: |
          # Frontend
          server {
              listen 80;
              server_name {{ domain }};

              location / {
                  proxy_pass http://157.10.160.146:{{ frontend_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

          # Node Exporter
          server {
              listen 80;
              server_name {{ exporter_domain }};
              location / {
                  proxy_pass http://157.10.160.146:{{ node_exporter_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

          # Prometheus
          server {
              listen 80;
              server_name {{ prometheus_domain }};
              location / {
                  proxy_pass http://103.31.39.130:{{ prometheus_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

          # Grafana
          server {
              listen 80;
              server_name {{ grafana_domain }};
              location / {
                  proxy_pass http://103.31.39.130:{{ grafana_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

    - name: Run Nginx container
      community.docker.docker_container:
        name: nginx
        image: nginx:latest
        state: started
        restart_policy: always
        published_ports:
          - "80:80"
          - "443:443"
        volumes:
          - /home/{{ ansible_user }}/nginx/default.conf:/etc/nginx/conf.d/default.conf
