---
- name: Generate SSL Certificate via Certbot
  hosts: gateway
  become: true

  tasks:
    - name: Install Certbot
      apt:
        name:
          - certbot
          - python3-certbot-nginx
        state: present
        update_cache: yes

    - name: Stop Nginx container sementara
      community.docker.docker_container:
        name: nginx
        state: stopped

    - name: Generate SSL untuk semua domain
      command: >
        certbot certonly --standalone
        -d {{ domain }}
        -d {{ exporter_domain }}
        -d {{ prometheus_domain }}
        -d {{ grafana_domain }}
        --non-interactive
        --agree-tos
        --email {{ ssl_email }}

    - name: Copy Nginx config dengan SSL
      copy:
        dest: /home/{{ ansible_user }}/nginx/default.conf
        content: |
          # Frontend
          server {
              listen 80;
              server_name {{ domain }};
              return 301 https://$host$request_uri;
          }
          server {
              listen 443 ssl;
              server_name {{ domain }};
              ssl_certificate /etc/letsencrypt/live/{{ domain }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/{{ domain }}/privkey.pem;
              location / {
                  proxy_pass http://157.10.160.146:{{ frontend_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

          # Node Exporter
          server {
              listen 80;
              server_name {{ exporter_domain }};
              return 301 https://$host$request_uri;
          }
          server {
              listen 443 ssl;
              server_name {{ exporter_domain }};
              ssl_certificate /etc/letsencrypt/live/{{ domain }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/{{ domain }}/privkey.pem;
              location / {
                  proxy_pass http://157.10.160.146:{{ node_exporter_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

          # Prometheus
          server {
              listen 80;
              server_name {{ prometheus_domain }};
              return 301 https://$host$request_uri;
          }
          server {
              listen 443 ssl;
              server_name {{ prometheus_domain }};
              ssl_certificate /etc/letsencrypt/live/{{ domain }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/{{ domain }}/privkey.pem;
              location / {
                  proxy_pass http://103.31.39.130:{{ prometheus_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

          # Grafana
          server {
              listen 80;
              server_name {{ grafana_domain }};
              return 301 https://$host$request_uri;
          }
          server {
              listen 443 ssl;
              server_name {{ grafana_domain }};
              ssl_certificate /etc/letsencrypt/live/{{ domain }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/{{ domain }}/privkey.pem;
              location / {
                  proxy_pass http://103.31.39.130:{{ grafana_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

    - name: Start Nginx container dengan SSL
      community.docker.docker_container:
        name: nginx
        image: nginx:latest
        state: started
        restart_policy: always
        recreate: yes
        published_ports:
          - "80:80"
          - "443:443"
        volumes:
          - /home/{{ ansible_user }}/nginx/default.conf:/etc/nginx/conf.d/default.conf
          - /etc/letsencrypt:/etc/letsencrypt:ro

    - name: Setup auto renew SSL
      cron:
        name: "Certbot renewal"
        job: "certbot renew --quiet && docker restart nginx"
        minute: "0"
        hour: "0"
        day: "1"
        month: "*"
