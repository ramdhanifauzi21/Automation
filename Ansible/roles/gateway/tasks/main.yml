# UFW GATEWAY
- name: Allow HTTP port
  ufw:
    rule: allow
    port: "80"
    proto: tcp
  tags: ufw

- name: Allow HTTPS port
  ufw:
    rule: allow
    port: "443"
    proto: tcp
  tags: ufw

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
    direction: incoming
  tags: ufw

# NGINX
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes
  tags: nginx

- name: Copy Nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/dumbmerch
    owner: root
    group: root
    mode: '0644'
  tags: nginx

- name: Enable Nginx config
  file:
    src: /etc/nginx/sites-available/dumbmerch
    dest: /etc/nginx/sites-enabled/dumbmerch
    state: link
  tags: nginx

- name: Remove default Nginx config
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  tags: nginx

- name: Reload Nginx
  service:
    name: nginx
    state: reloaded
  tags: nginx

# INSTAL APACHE2-UTILS(Auth Prometheus)
- name: Install apache2-utils
  apt:
    name: apache2-utils
    state: present
  tags: nginx

- name: Create basic auth password file
  shell: |
    htpasswd -cb /etc/nginx/.htpasswd {{ username }} {{ user_password }}
  tags: nginx

# SSL CERTBOT
- name: Install Certbot dan Cloudflare plugin
  apt:
    name:
      - certbot
      - python3-certbot-dns-cloudflare
    state: present
  tags: ssl

- name: Create Cloudflare credentials file
  template:
    src: cloudflare.ini.j2
    dest: /root/.cloudflare.ini
    mode: '0600'
  tags: ssl

- name: Generate SSL Wildcard
  shell: |
    certbot certonly --dns-cloudflare \
      --dns-cloudflare-credentials /root/.cloudflare.ini \
      --non-interactive \
      --agree-tos \
      --email {{ ssl_email }} \
      --expand \
      -d "*.fauzi.studentdumbways.my.id" \
      -d "fauzi.studentdumbways.my.id" \
      -d "*.staging.fauzi.studentdumbways.my.id"
  tags: ssl

- name: Copy SSL renewal script
  template:
    src: ssl-renew.sh.j2
    dest: /home/{{ username }}/ssl-renew.sh
    mode: '0755'
  tags: ssl

- name: Add cronjob for SSL renewal
  cron:
    name: "SSL Auto Renewal"
    minute: "0"
    hour: "0"
    day: "1"
    job: "/home/{{ username }}/ssl-renew.sh >> /var/log/ssl-renew.log 2>&1"
  tags: ssl

# MONITORING
- name: Create monitoring directory
  file:
    path: /home/{{ username }}/monitoring
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0755'
  tags: monitoring

- name: Copy docker-compose monitoring
  template:
    src: monitoring.yml.j2
    dest: /home/{{ username }}/monitoring/docker-compose.yml
    owner: "{{ username }}"
    group: "{{ username }}"
  tags: monitoring

- name: Deploy monitoring
  shell: |
    cd /home/{{ username }}/monitoring
    docker compose up -d
  become_user: "{{ username }}"
  async: 600
  poll: 10
  tags: monitoring
