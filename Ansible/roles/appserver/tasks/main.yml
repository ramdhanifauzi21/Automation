# SONARQUBE
- name: Set vm.max_map_count for SonarQube
  sysctl:
    name: vm.max_map_count
    value: '262144'
    state: present
    reload: yes
  tags: sonarqube

- name: Create SonarQube directory
  file:
    path: /home/{{ username }}/sonarqube
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0755'
  tags: sonarqube

- name: Copy docker-compose SonarQube
  template:
    src: sonarqube.yml.j2
    dest: /home/{{ username }}/sonarqube/docker-compose.yml
    owner: "{{ username }}"
    group: "{{ username }}"
  tags: sonarqube

- name: Set permission sonarqube directories
  file:
    path: /home/{{ username }}/sonarqube/{{ item }}
    state: directory
    owner: "1000"
    group: "1000"
    mode: '0755'
  loop:
    - data
    - logs
    - extensions
  tags: sonarqube

- name: Deploy SonarQube
  shell: |
    cd /home/{{ username }}/sonarqube
    docker compose up -d
  become_user: "{{ username }}"
  async: 600
  poll: 10
  tags: sonarqube
