# SWAP
- name: Create swap file
  command: fallocate -l 2G /swapfile
  args:
    creates: /swapfile
  tags: swap

- name: Set swap permissions
  file:
    path: /swapfile
    mode: '0600'
  tags: swap

- name: Format swap
  command: mkswap /swapfile
  tags: swap

- name: Enable swap
  command: swapon /swapfile
  ignore_errors: yes
  tags: swap

- name: Persist swap on reboot
  lineinfile:
    path: /etc/fstab
    line: '/swapfile none swap sw 0 0'
    state: present
  tags: swap

# UFW APPSERVER
- name: Allow Frontend Staging port
  ufw:
    rule: allow
    port: "{{ frontend_port_staging }}"
    proto: tcp
  tags: ufw

- name: Allow Frontend Production port
  ufw:
    rule: allow
    port: "{{ frontend_port_production }}"
    proto: tcp
  tags: ufw

- name: Allow Backend Staging port
  ufw:
    rule: allow
    port: "{{ backend_port_staging }}"
    proto: tcp
  tags: ufw

- name: Allow Backend Production port
  ufw:
    rule: allow
    port: "{{ backend_port_production }}"
    proto: tcp
  tags: ufw

- name: Allow Docker Registry port
  ufw:
    rule: allow
    port: "{{ registry_port }}"
    proto: tcp
  tags: ufw

- name: Allow SonarQube port
  ufw:
    rule: allow
    port: "9000"
    proto: tcp
  tags: ufw

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
    direction: incoming
  tags: ufw

# COPY SSH KEY
- name: Copy SSH private key to server
  copy:
    src: ~/.ssh/id_rsa
    dest: /home/{{ username }}/.ssh/id_rsa
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0600'
  tags: ssh

- name: Copy SSH public key to server
  copy:
    src: ~/.ssh/id_rsa.pub
    dest: /home/{{ username }}/.ssh/id_rsa.pub
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0644'
  tags: ssh

- name: Add GitHub to known_hosts
  known_hosts:
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan github.com') }}"
    path: /home/{{ username }}/.ssh/known_hosts
  become_user: "{{ username }}"
  tags: ssh

# FRONTEND STAGING
- name: Create fe-staging directory
  file:
    path: /home/{{ username }}/fe-staging
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0755'
  tags: fe-staging

- name: Clone FE repo staging
  git:
    repo: "{{ frontend_repo }}"
    dest: /home/{{ username }}/fe-staging
    version: staging
    force: yes
    key_file: /home/{{ username }}/.ssh/id_rsa
    accept_hostkey: yes
  become_user: "{{ username }}"
  tags: fe-staging

- name: Copy .env FE staging
  copy:
    src: ~/fe-dumbmerch/.env
    dest: /home/{{ username }}/fe-staging/.env
    owner: "{{ username }}"
    group: "{{ username }}"
  tags: fe-staging

- name: Deploy FE staging
  shell: |
    cd /home/{{ username }}/fe-staging
    docker compose up -d --build
  become_user: "{{ username }}"
  async: 600
  poll: 10
  tags: fe-staging

